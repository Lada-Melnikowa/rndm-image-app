<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Случайная картинка</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        img {
            max-width: 600px;
            border-radius: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Случайная картинка</h2>

<button onclick="getImage()">Показать картинку</button>
<button onclick="downloadImage()">Скачать</button>

<br>
<img id="image" crossorigin="anonymous">

<script>
    let imageLoaded = false;

    function getImage() {
        const image = document.getElementById("image");
        imageLoaded = false;

        image.onload = function() {
            imageLoaded = true;
        };

        image.src = "https://picsum.photos/600/400?random=" + Math.random();
    }

    function downloadImage() {
        if (!imageLoaded) {
            alert("Сначала загрузите картинку!");
            return;
        }

        const image = document.getElementById("image");

        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(image, 0, 0);

        const link = document.createElement("a");
        link.download = "image.jpg";
        link.href = canvas.toDataURL("image/jpeg");
        link.click();
    }
</script>

</body>
</html>
